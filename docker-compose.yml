version: '3.8'
services:
  postgres:
    image: postgres:18
    container_name: wb-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: wb_feedbacks
    ports:
      - '5433:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: .
    container_name: wb-backend
    ports:
      - '3000:3000'
    depends_on:
      - postgres

volumes:
  pgdata: